<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML 实体字符演示</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    section { margin: 1.5rem 0; padding: 1rem; background: #f5f5f5; border-radius: 8px; }
    .label { color: #666; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .demo { font-size: 1.1rem; padding: 0.5rem; background: #fff; border: 1px solid #ddd; }
    code { display: block; margin-top: 0.5rem; padding: 0.5rem; background: #1e1e1e; color: #d4d4d4; font-size: 0.85rem; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>HTML 实体字符 — 浏览器真实效果</h1>
  <p>请按 F12 打开开发者工具，在 Elements 里查看下面每段的 HTML 源码。</p>

  <section>
    <div class="label">示例 1：小于号（实体 lt）</div>
    <div class="demo"><p>5 &lt; 10</p></div>
    <code>&lt;p&gt;5 &amp;lt; 10&lt;/p&gt;</code>
  </section>

  <section>
    <div class="label">示例 2：和号（实体 amp）</div>
    <div class="demo"><p>A &amp; B</p></div>
    <code>&lt;p&gt;A &amp;amp; B&lt;/p&gt;</code>
  </section>

  <section>
    <div class="label">示例 3：不换行空格（实体 nbsp，下面「之间」有两格）</div>
    <div class="demo"><p>词与词之间&nbsp;&nbsp;留空</p></div>
    <code>&lt;p&gt;词与词之间&amp;nbsp;&amp;nbsp;留空&lt;/p&gt;</code>
  </section>

  <section>
    <div class="label">常见实体速查</div>
    <table border="1" cellpadding="8" style="border-collapse:collapse;width:100%;background:#fff;">
      <tr><th>实体（源码里写）</th><th>页面显示</th></tr>
      <tr><td>和号+lt+分号</td><td>小于号</td></tr>
      <tr><td>和号+gt+分号</td><td>大于号</td></tr>
      <tr><td>和号+nbsp+分号</td><td>不换行空格</td></tr>
      <tr><td>和号+amp+分号</td><td>和号</td></tr>
    </table>
  </section>
</body>
</html>
