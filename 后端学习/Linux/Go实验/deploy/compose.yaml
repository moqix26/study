name: shortlink-lab

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}"
      MYSQL_DATABASE: shortlink
      MYSQL_USER: shortlink
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VERSION: "${APP_VERSION:-dev}"
        COMMIT: "${APP_COMMIT:-none}"
        BUILD_TIME: "${APP_BUILD_TIME:-unknown}"
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_ADDR: 0.0.0.0:8080
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost}"
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-}"
      MYSQL_DSN: "shortlink:${MYSQL_PASSWORD}@tcp(mysql:3306)/shortlink?parseTime=true"
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "/shortlink-api", "-health-check", "-health-url", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  backend:
    internal: true

volumes:
  mysql-data:
  redis-data:
